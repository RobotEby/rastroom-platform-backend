services:
  postgres:
    image: postgres:16-alpine
    container_name: rastroom-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rastroom
      POSTGRES_USER: rastroom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_DB_PASSWORD}
    volumes:
      - rastroom_staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rastroom -d rastroom"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rastroom-staging-api
    restart: unless-stopped
    env_file:
      - .env.staging
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - rastroom_staging_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8081/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  rastroom_staging_postgres_data:
  rastroom_staging_uploads:
