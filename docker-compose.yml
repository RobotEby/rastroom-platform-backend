services:
  postgres:
    image: postgres:16-alpine
    container_name: rastroom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rastroom
      POSTGRES_USER: rastroom
      POSTGRES_PASSWORD: rastroom
    ports:
      - "5432:5432"
    volumes:
      - rastroom_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rastroom -d rastroom"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rastroom_postgres_data:
